<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InterviewGuide - AgentGuide</title>
  <style>
    body { margin:0; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC",sans-serif; background:#0b1220; color:#e2e8f0; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 28px 16px 60px; }
    a { color:#7dd3fc; text-decoration:none; }
    .btn { display:inline-block; padding:10px 14px; border-radius:10px; background:#1e293b; border:1px solid #334155; margin-right:8px; }
    .card { margin-top:18px; border:1px solid #334155; border-radius:12px; padding:16px; background:#0f172a; }
    .item { padding:10px 0; border-bottom:1px dashed #334155; }
    .item:last-child { border-bottom:none; }
    .path { font-size:12px; color:#94a3b8; }
    .muted { color:#94a3b8; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🧠 InterviewGuide（轻量版）</h1>
    <p class="muted">已切到站内学习模式：下面题库内容直接在网页内阅读，不再跳转 GitHub。</p>
    <a class="btn" href="../">← 返回首页</a>
    <a class="btn" href="../learn/?file=docs/04-interview/01-theory-questions.md">进入完整题库阅读</a>

    <div class="card">
      <h3>面试文档目录</h3>
      <div id="list" class="muted">加载中...</div>
    </div>
  </div>

  <script>
    fetch('../data/learning-content.json')
      .then(r => r.json())
      .then(items => {
        const list = items.filter(i => (i.path || '').startsWith('docs/04-interview/'));
        const root = document.getElementById('list');
        if (!list.length) {
          root.textContent = '暂无文档';
          return;
        }
        root.innerHTML = list.map(i => `
          <div class="item">
            <a href="../learn/?file=${encodeURIComponent(i.path)}">${i.title}</a>
            <div class="path">${i.path}</div>
          </div>
        `).join('');
      })
      .catch(() => {
        document.getElementById('list').textContent = '目录加载失败';
      });
  </script>
</body>
</html>
